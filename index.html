<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esri + NVIDIA Integration Explorer</title>

  <!-- Calcite Design System -->
  <script type="module" src="https://js.arcgis.com/calcite-components/3.2.0/calcite.esm.js"></script>
  <link rel="stylesheet" href="https://js.arcgis.com/calcite-components/3.2.0/calcite.css" />

  <style>
    :root {
      --nvidia-green: #76b900;
      --esri-blue: #0079c1;
      --card-bg: #1a1a2e;
      --card-hover: #16213e;
      --surface: #0f0f1a;
      --text-primary: #e8e8e8;
      --text-secondary: #a0a0b0;
      --status-production: #76b900;
      --status-emerging: #f5a623;
      --status-transitioning: #e07c24;
      --status-active: #4fc3f7;
      --status-informal: #ab47bc;
      --status-ongoing: #78909c;
      --status-ecosystem: #8d6e63;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Avenir Next", "Helvetica Neue", sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      overflow: hidden;
    }

    calcite-shell {
      --calcite-color-brand: var(--nvidia-green);
    }

    /* Header */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
      border-bottom: 2px solid var(--nvidia-green);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-brand h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      background: linear-gradient(90deg, var(--esri-blue), var(--nvidia-green));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .brand-logos {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .brand-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-esri { background: var(--esri-blue); }
    .dot-nvidia { background: var(--nvidia-green); }

    .stat-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(118, 185, 0, 0.15);
      color: var(--nvidia-green);
      border: 1px solid rgba(118, 185, 0, 0.3);
    }

    /* Main two-panel layout */
    .main-layout {
      display: flex;
      height: calc(100vh - 60px);
      overflow: hidden;
    }

    /* Left panel: list */
    .list-panel {
      width: 420px;
      min-width: 420px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(255,255,255,0.06);
      background: var(--surface);
    }

    /* Search */
    .search-box {
      padding: 12px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .search-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: var(--nvidia-green);
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 10px 12px;
      background: var(--surface);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .filter-chip {
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: var(--text-secondary);
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-chip:hover {
      border-color: var(--nvidia-green);
      color: var(--nvidia-green);
    }

    .filter-chip.active {
      background: rgba(118, 185, 0, 0.2);
      border-color: var(--nvidia-green);
      color: var(--nvidia-green);
    }

    /* Cards */
    .cards-container {
      overflow-y: auto;
      flex: 1;
      padding: 8px 12px;
    }

    .integration-card {
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .integration-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }

    .integration-card:hover {
      background: var(--card-hover);
      border-color: rgba(118, 185, 0, 0.3);
      transform: translateX(4px);
    }

    .integration-card.selected {
      border-color: var(--nvidia-green);
      background: var(--card-hover);
      box-shadow: 0 0 20px rgba(118, 185, 0, 0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .card-number {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 700;
      min-width: 24px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      line-height: 1.3;
    }

    .card-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      margin-left: 8px;
    }

    .status-production { background: rgba(118,185,0,0.15); color: var(--status-production); }
    .status-emerging { background: rgba(245,166,35,0.15); color: var(--status-emerging); }
    .status-transitioning { background: rgba(224,124,36,0.15); color: var(--status-transitioning); }
    .status-active { background: rgba(79,195,247,0.15); color: var(--status-active); }
    .status-informal { background: rgba(171,71,188,0.15); color: var(--status-informal); }
    .status-ongoing { background: rgba(120,144,156,0.15); color: var(--status-ongoing); }
    .status-ecosystem { background: rgba(141,110,99,0.15); color: var(--status-ecosystem); }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-meta-row {
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    .meta-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      min-width: 52px;
      font-weight: 600;
    }

    .meta-value {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .meta-esri { color: #4da8e8; }
    .meta-nvidia { color: #9ad034; }

    /* Nav hint */
    .nav-hint {
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      color: var(--text-secondary);
      text-align: center;
    }

    .nav-hint kbd {
      background: rgba(255,255,255,0.1);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-family: monospace;
    }

    /* Right panel: detail */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      background: #111122;
    }

    .detail-hero {
      padding: 32px 32px 24px;
      background: linear-gradient(180deg, rgba(118,185,0,0.08) 0%, transparent 100%);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .detail-hero .detail-number {
      font-size: 56px;
      font-weight: 800;
      color: rgba(118,185,0,0.2);
      line-height: 1;
      margin-bottom: 4px;
    }

    .detail-hero h2 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 8px;
      color: var(--text-primary);
    }

    .detail-hero .detail-category {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .detail-hero .detail-status {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .detail-body {
      padding: 28px 32px;
    }

    .detail-section {
      margin-bottom: 24px;
    }

    .detail-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-secondary);
      margin: 0 0 10px;
      font-weight: 700;
    }

    .detail-section p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-primary);
      margin: 0;
    }

    .tech-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tech-tag {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
    }

    .tech-tag.esri {
      background: rgba(0,121,193,0.15);
      color: #4da8e8;
      border: 1px solid rgba(0,121,193,0.25);
    }

    .tech-tag.nvidia {
      background: rgba(118,185,0,0.12);
      color: #9ad034;
      border: 1px solid rgba(118,185,0,0.25);
    }

    /* Architecture flow */
    .arch-flow {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.06);
      flex-wrap: wrap;
    }

    .arch-node {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
    }

    .arch-node.esri-node {
      background: rgba(0,121,193,0.2);
      border: 1px solid rgba(0,121,193,0.4);
      color: #4da8e8;
    }

    .arch-node.nvidia-node {
      background: rgba(118,185,0,0.15);
      border: 1px solid rgba(118,185,0,0.3);
      color: #9ad034;
    }

    .arch-arrow {
      color: var(--text-secondary);
      font-size: 18px;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-secondary);
      padding: 40px 32px;
      text-align: center;
    }

    .empty-state .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.2;
    }

    .empty-state p {
      font-size: 15px;
      line-height: 1.6;
    }
  </style>
</head>

        esri: "ArcGIS OD Cost Matrix",
        nvidia: "cuOpt",
        useCase: "GPU-accelerated vehicle route optimization. Esri's OD Cost Matrix feeds into NVIDIA cuOpt for solving complex vehicle routing problems with constraints at unprecedented speed.",
        status: "Informal", category: "Logistics / Routing",
        flow: [
          { label: "OD Cost Matrix", type: "esri" }, { label: "Network Analyst", type: "esri" },
          { label: "cuOpt", type: "nvidia" }, { label: "GPU Solver", type: "nvidia" }
        ]
      },
      {
        id: 19, title: "GTC Presentations",
        esri: "Various Esri Products",
        nvidia: "Various NVIDIA Technologies",
        useCase: "Ongoing joint conference sessions covering deep learning, video analytics, patrol optimization, Gaussian splatting, and smart cities. Annual collaboration at NVIDIA's flagship AI conference since 2020.",
        status: "Ongoing", category: "Partnership",
        flow: [
          { label: "Esri Speakers", type: "esri" }, { label: "Joint Sessions", type: "esri" },
          { label: "GTC Conference", type: "nvidia" }
        ]
      },
      {
        id: 20, title: "NVIDIA RAPIDS cuSpatial",
        esri: "Indirect (ecosystem interop)",
        nvidia: "cuSpatial CUDA",
        useCase: "GPU-accelerated vector geospatial operations: point-in-polygon, spatial joins, trajectory analysis. 10x-10,000x speedup over CPU. Ecosystem-adjacent — can feed data into/from ArcGIS workflows.",
        status: "Ecosystem adjacent", category: "Open Source",
        flow: [
          { label: "ArcGIS Data", type: "esri" },
          { label: "cuSpatial", type: "nvidia" }, { label: "RAPIDS", type: "nvidia" }, { label: "cuDF / cuML", type: "nvidia" }
        ]
      }
    ];

    // ──────────────────────────────────────────────
    // STATUS helpers
    // ──────────────────────────────────────────────
    function statusClass(status) {
      const s = status.toLowerCase();
      if (s.includes("production")) return "status-production";
      if (s.includes("emerging")) return "status-emerging";
      if (s.includes("transitioning")) return "status-transitioning";
      if (s.includes("active")) return "status-active";
      if (s.includes("informal")) return "status-informal";
      if (s.includes("ongoing")) return "status-ongoing";
      if (s.includes("ecosystem")) return "status-ecosystem";
      return "status-production";
    }

    function statusColor(status) {
      const s = status.toLowerCase();
      if (s.includes("production")) return "118,185,0";
      if (s.includes("emerging")) return "245,166,35";
      if (s.includes("transitioning")) return "224,124,36";
      if (s.includes("active")) return "79,195,247";
      if (s.includes("informal")) return "171,71,188";
      if (s.includes("ongoing")) return "120,144,156";
      if (s.includes("ecosystem")) return "141,110,99";
      return "118,185,0";
    }

    // ──────────────────────────────────────────────
    // RENDER CARDS
    // ──────────────────────────────────────────────
    const cardsContainer = document.getElementById("cardsContainer");
    let selectedId = null;

    function renderCards(items) {
      cardsContainer.innerHTML = "";
      items.forEach(item => {
        const rgb = statusColor(item.status);
        const card = document.createElement("div");
        card.className = `integration-card${item.id === selectedId ? " selected" : ""}`;
        card.dataset.id = item.id;
        card.innerHTML = `
          <style>.integration-card[data-id="${item.id}"]::before{background:rgb(${rgb});}</style>
          <div class="card-header">
            <span class="card-number">#${item.id}</span>
            <span class="card-title">${item.title}</span>
            <span class="card-status ${statusClass(item.status)}">${item.status}</span>
          </div>
          <div class="card-meta">
            <div class="card-meta-row">
              <span class="meta-label meta-esri">Esri</span>
              <span class="meta-value">${item.esri}</span>
            </div>
            <div class="card-meta-row">
              <span class="meta-label meta-nvidia">NVIDIA</span>
              <span class="meta-value">${item.nvidia}</span>
            </div>
          </div>
        `;
        card.addEventListener("click", () => selectIntegration(item.id));
        cardsContainer.appendChild(card);
      });
      document.getElementById("countBadge").textContent = `${items.length} Integration${items.length !== 1 ? "s" : ""}`;
    }

    // ──────────────────────────────────────────────
    // DETAIL VIEW
    // ──────────────────────────────────────────────
    function showDetail(item) {
      const rgb = statusColor(item.status);
      const detailContent = document.getElementById("detailContent");

      const flowHtml = item.flow.map((node, i) => {
        const arrow = i < item.flow.length - 1 ? '<span class="arch-arrow">&rarr;</span>' : '';
        return `<span class="arch-node ${node.type}-node">${node.label}</span>${arrow}`;
      }).join("");

      detailContent.innerHTML = `
        <div class="detail-hero">
          <div class="detail-number">#${item.id}</div>
          <h2>${item.title}</h2>
          <div class="detail-category">${item.category}</div>
          <span class="detail-status ${statusClass(item.status)}" style="background:rgba(${rgb},0.15);color:rgb(${rgb});">
            ${item.status}
          </span>
        </div>
        <div class="detail-body">
          <div class="detail-section">
            <h3>Use Case</h3>
            <p>${item.useCase}</p>
          </div>
          <div class="detail-section">
            <h3>Esri Technologies</h3>
            <div class="tech-tags">
              ${item.esri.split(",").map(t => `<span class="tech-tag esri">${t.trim()}</span>`).join("")}
            </div>
          </div>
          <div class="detail-section">
            <h3>NVIDIA Technologies</h3>
            <div class="tech-tags">
              ${item.nvidia.split(",").map(t => `<span class="tech-tag nvidia">${t.trim()}</span>`).join("")}
            </div>
          </div>
          <div class="detail-section">
            <h3>Architecture Flow</h3>
            <div class="arch-flow">${flowHtml}</div>
          </div>
        </div>
      `;
    }

    // ──────────────────────────────────────────────
    // SELECT
    // ──────────────────────────────────────────────
    function selectIntegration(id) {
      selectedId = id;
      const item = integrations.find(i => i.id === id);
      if (!item) return;

      document.querySelectorAll(".integration-card").forEach(c => {
        c.classList.toggle("selected", parseInt(c.dataset.id) === id);
      });

      showDetail(item);
    }

    // ──────────────────────────────────────────────
    // FILTERING
    // ──────────────────────────────────────────────
    let currentFilter = "all";
    let searchTerm = "";

    function getFilteredItems() {
      return integrations.filter(item => {
        const matchesFilter = currentFilter === "all" ||
          item.status.toLowerCase().includes(currentFilter);
        const matchesSearch = searchTerm === "" ||
          item.title.toLowerCase().includes(searchTerm) ||
          item.esri.toLowerCase().includes(searchTerm) ||
          item.nvidia.toLowerCase().includes(searchTerm) ||
          item.useCase.toLowerCase().includes(searchTerm) ||
          item.category.toLowerCase().includes(searchTerm);
        return matchesFilter && matchesSearch;
      });
    }

    function applyFilters() {
      renderCards(getFilteredItems());
    }

    document.getElementById("filterBar").addEventListener("click", (e) => {
      if (e.target.classList.contains("filter-chip")) {
        document.querySelectorAll(".filter-chip").forEach(c => c.classList.remove("active"));
        e.target.classList.add("active");
        currentFilter = e.target.dataset.filter;
        applyFilters();
      }
    });

    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchTerm = e.target.value.toLowerCase();
      applyFilters();
    });

    // ──────────────────────────────────────────────
    // KEYBOARD NAV
    // ──────────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
      const items = getFilteredItems();
      if (!items.length) return;

      if (e.key === "ArrowDown" || e.key === "ArrowUp") {
        e.preventDefault();
        const currentIdx = items.findIndex(i => i.id === selectedId);
        let nextIdx;
        if (e.key === "ArrowDown") {
          nextIdx = currentIdx < items.length - 1 ? currentIdx + 1 : 0;
        } else {
          nextIdx = currentIdx > 0 ? currentIdx - 1 : items.length - 1;
        }
        selectIntegration(items[nextIdx].id);
        const card = cardsContainer.querySelector(`[data-id="${items[nextIdx].id}"]`);
        card?.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    });

    // ──────────────────────────────────────────────
    // INIT
    // ──────────────────────────────────────────────
    renderCards(integrations);
  </script>
</body>
</html>
